@if (!agregarequipo()) {
  <div class="form-container">
    <button class="btn-close" (click)="cerrar()">
      <img src="assets/x.png" alt="Cerrar" />
    </button>
    <div class="form-content">
      <h2>Registrar Mantenimiento</h2>
      <form #form="ngForm">
        <div class="form-group">
          <label for="NombreEmpresaMantenimiento"
            >Empresa de Mantenimiento</label
          >
          <app-custom-select
            name="NombreEmpresaMantenimiento"
            [(ngModel)]="mantenimiento.NombreEmpresaMantenimiento"
            required
            [opciones]="empresas"
            placeholder="Selecciona una empresa"
          ></app-custom-select>
        </div>
        <div class="form-group">
          <label for="FechaMantenimiento">Fecha de Inicio</label>
          <input
            type="date"
            id="FechaMantenimiento"
            name="FechaMantenimiento"
            [(ngModel)]="mantenimiento.FechaMantenimiento"
            required
            class="form-input"
            [min]="fechaminima"
            [max]="fechamaxima(mantenimiento.FechaMantenimiento)"
          />
        </div>
        <div class="form-group">
          <label for="FechaFinalDeMantenimiento">Fecha de Finalización</label>
          <input
            type="date"
            id="FechaFinalDeMantenimiento"
            name="FechaFinalDeMantenimiento"
            [(ngModel)]="mantenimiento.FechaFinalDeMantenimiento"
            required
            class="form-input"
            [min]="mantenimiento.FechaMantenimiento"
            [max]="fechamaxima(mantenimiento.FechaMantenimiento)"
          />
        </div>
        <div class="form-group">
          <label for="Costo">Costo</label>
          <input
            type="number"
            id="Costo"
            name="Costo"
            [(ngModel)]="mantenimiento.Costo"
            required
            step="0.01"
            min="0"
            placeholder="0.00"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label for="Descripcion">Descripción del Mantenimiento</label>
          <textarea
            id="Descripcion"
            name="Descripcion"
            [(ngModel)]="mantenimiento.Descripcion"
            rows="3"
            placeholder="Describe el mantenimiento realizado"
            class="form-input"
          ></textarea>
        </div>
        @for (item of mantenimientoSeleccionado | keyvalue; track item.key) {
          <div class="equipo-pill">
            <span class="equipo-id">{{ item.key }}</span>
            <span class="equipo-nombre">{{ item.value.nombre }}</span>
            <span class="equipo-tipo">{{ item.value.TipoMantenimiento }}</span>
            <button class="btn-remove" (click)="eliminarEquipo(item.key)">
              <img
                class="remove-icon"
                src="assets/x.png"
                alt="Eliminar"
                width="12"
                height="12"
              />
            </button>
          </div>
        }
        <div class="form-submit">
          <button
            class="btn-agregar-equipo"
            type="button"
            (click)="agregarEquipo()"
          >
            Agregar equipo
          </button>
          <button
            (click)="validarcreacion()"
            type="submit"
            class="register-button"
            [disabled]="!form.valid || !validarFecha()"
          >
            <span>Registrar Mantenimiento</span>
          </button>
        </div>
      </form>
    </div>
  </div>
}
@if (agregarequipo()) {
  <app-listaequipo [agregarequipo]="agregarequipo"> </app-listaequipo>
}
@if (error()) {
  <app-mostrarerror [error]="error" [mensaje]="mensajeerror"></app-mostrarerror>
}
@if (aviso()) {
  <app-aviso
    [cerrar]="aviso"
    [mensaje]="mensajeaviso"
    (aceptar)="registrar()"
  ></app-aviso>
}
@if (exito()) {
  <app-aviso-exito
    [exito]="exito"
    [mensaje]="mensajeexito"
    (accion)="cerrar()"
  ></app-aviso-exito>
}
