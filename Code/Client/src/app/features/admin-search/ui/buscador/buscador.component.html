<div class="search-and-filter-row">
  <div class="search-input-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input
      type="text"
      [(ngModel)]="terminoBusquedaLocal"
      (ngModelChange)="onSearchInput()"
      (keydown.enter)="buscar()"
      placeholder="Buscar ..."
      class="search-input"
    />
    @if (terminoBusquedaLocal) {
      <button
        class="clear-search"
        (click)="limpiarBusqueda()"
        title="Limpiar búsqueda"
      >
        <i class="fas fa-times"></i>
      </button>
    }
  </div>
  <div class="filter-container">
    @if (columnas.length > 0) {
      <div class="custom-dropdown sort-dropdown">
        <button
          type="button"
          class="dropdown-header"
          (click)="toggleColumnas()"
          [class.dropdown-header--open]="mostrarColumnas"
          [attr.aria-expanded]="mostrarColumnas"
          aria-label="Ordenar tabla"
        >
          <span class="current-value">
            <i class="fas fa-sort dropdown-filter-icon"></i>
            {{ sortCol || "Ordenar" }}
          </span>
          <img
            [src]="
              mostrarColumnas
                ? '/assets/down_solid.png'
                : '/assets/down_line.png'
            "
            alt=""
            class="dropdown-arrow"
          />
        </button>
        @if (mostrarColumnas) {
          <ul class="dropdown-list sort-dropdown__list">
            @for (columna of columnas; track columna) {
              <li
                (click)="seleccionarColumna(columna)"
                [class.active]="sortCol === columna.trim()"
              >
                <i
                  class="fas"
                  [class.fa-sort]="iconoOrdenColumna(columna) === 'fa-sort'"
                  [class.fa-sort-up]="
                    iconoOrdenColumna(columna) === 'fa-sort-up'
                  "
                  [class.fa-sort-down]="
                    iconoOrdenColumna(columna) === 'fa-sort-down'
                  "
                ></i>
                {{ columna }}
              </li>
            }
          </ul>
        }
      </div>
    }
    <ng-content></ng-content>
    <ng-content select=".boton-derecha"></ng-content>
  </div>
</div>
@if (terminoBusquedaLocal) {
  <div class="filter-chips">
    <span class="filter-chip">
      "{{ terminoBusquedaLocal }}"
      <button (click)="limpiarBusqueda()" aria-label="Limpiar búsqueda">
        <i class="fas fa-times"></i>
      </button>
    </span>
  </div>
}
