<div class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h2 class="modal-title">Contrato</h2>
      <button class="btn-close" (click)="cerrar()" type="button">
        <img src="assets/x.png" alt="Cerrar" />
      </button>
    </div>
    <div class="modal-content">
      <div class="contract-viewer">
        <div
          #contractContent
          class="contract-content"
          *ngIf="contratoContent; else loading"
          [innerHTML]="contratoContent"
        ></div>
        <ng-template #loading>
          <div class="loading">
            <div class="spinner"></div>
            <p>Cargando contrato...</p>
          </div>
        </ng-template>
      </div>
    </div>
    <div class="modal-footer" *ngIf="contratoContent">
      <button class="btn-secondary" (click)="descargarContrato()" type="button">
        <i class="fas fa-print"></i> Descargar Contrato
      </button>
    </div>
  </div>
</div>
@if (error()) {
  <app-mostrarerror [error]="error" [mensaje]="mensajeerror"></app-mostrarerror>
}
