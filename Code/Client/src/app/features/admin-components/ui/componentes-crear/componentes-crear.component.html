<div class="form-container">
  <button class="btn-close" (click)="cerrar()">
    <img src="assets/x.png" alt="Cerrar" />
  </button>
  <div class="form-content">
    <h2>Registrar Componente</h2>
    <form #form="ngForm" (ngSubmit)="validarregistro()">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="componente.Nombre"
          required
          maxlength="50"
          placeholder="Ingresa el nombre del componente"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="modelo">Modelo</label>
        <input
          type="text"
          id="modelo"
          name="modelo"
          [(ngModel)]="componente.Modelo"
          required
          maxlength="50"
          placeholder="Modelo del componente"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="tipo">Tipo</label>
        <input
          type="text"
          id="tipo"
          name="tipo"
          [(ngModel)]="componente.Tipo"
          required
          maxlength="50"
          placeholder="Tipo de componente"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="codigo_imt">Codigo Imt Equipo</label>
        <app-custom-select
          name="codigo_imt"
          [(ngModel)]="componente.CodigoImtEquipo"
          required
          [opciones]="equiposOpciones"
          placeholder="Selecciona un equipo"
        ></app-custom-select>
      </div>
      <div class="form-group">
        <label for="precio">Precio Referencia</label>
        <input
          type="number"
          id="precio"
          name="precio"
          [(ngModel)]="componente.PrecioReferencia"
          required
          min="0"
          step="0.01"
          placeholder="0.00"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea
          id="descripcion"
          name="descripcion"
          [(ngModel)]="componente.Descripcion"
          maxlength="100"
          placeholder="Descripción del componente"
          class="form-input"
        ></textarea>
      </div>
      <div class="form-group">
        <label for="url_data_sheet">URL Data Sheet</label>
        <input
          type="url"
          id="url_data_sheet"
          name="url_data_sheet"
          maxlength="200"
          pattern="https?://.+"
          [(ngModel)]="componente.UrlDataSheet"
          placeholder="https://ejemplo.com/datasheet.pdf"
          class="form-input"
        />
      </div>
      <div class="form-submit">
        <button type="submit" class="register-button" [disabled]="!form.valid">
          <span>Registrar Componente</span>
        </button>
      </div>
    </form>
  </div>
</div>
@if (error()) {
  <app-mostrarerror [error]="error" [mensaje]="mensajeerror"></app-mostrarerror>
}
@if (aviso()) {
  <app-aviso
    [cerrar]="aviso"
    [mensaje]="mensajeaviso"
    (aceptar)="registrar()"
  ></app-aviso>
}
@if (exito()) {
  <app-aviso-exito
    [exito]="exito"
    [mensaje]="mensajeexito"
    (accion)="cerrar()"
  ></app-aviso-exito>
}
