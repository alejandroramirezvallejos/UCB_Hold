<div class="container">
  <button class="cerrar" (click)="cerrar()" aria-label="Cerrar">
      <img
        #closeIcon
        src="assets/x.png"
        alt="Cerrar"
        (mouseenter)="closeIcon.src = '/assets/x_color.png'"
        (mouseleave)="closeIcon.src = '/assets/x.png'"
      />
  </button>
  <h1>¡Éxito!</h1>
  <div class="mensaje-container">
    <p>{{mensaje}}</p>
  </div>
  <div class="botones-container">
    <div class="aceptar" (click)="cerrar()">Aceptar</div>
  </div>
</div>
