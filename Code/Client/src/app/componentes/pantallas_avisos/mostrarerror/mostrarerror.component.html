<div class="overlay">
  @if(mensaje.length<200 ){
    <div class="container">
      <button class="cerrar" (click)="clickx()" aria-label="Cerrar">
        <img
          #closeIcon1
          src="assets/x.png"
          alt="Cerrar"
          (mouseenter)="closeIcon1.src = '/assets/x_color.png'"
          (mouseleave)="closeIcon1.src = '/assets/x.png'"
        />
      </button>
      <h1>Error </h1>
      <p>{{mensaje}}</p>
      <div class="volver-btn" (click)="clickx()">Volver</div>
    </div>
  }
  @else{
    <div class="container-big">
      <button class="cerrar" (click)="clickx()" aria-label="Cerrar">
        <img
          #closeIcon2
          src="assets/x.png"
          alt="Cerrar"
          (mouseenter)="closeIcon2.src = '/assets/x_color.png'"
          (mouseleave)="closeIcon2.src = '/assets/x.png'"
        />
      </button>
      <h1>Error </h1>
      <div class="pbig">{{mensaje}}</div>
      <div class="volver-btn" (click)="clickx()">Volver</div>
    </div>
  }
</div>
