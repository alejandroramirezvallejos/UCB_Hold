<div class="search-and-filter-row">
    <div class="search-input-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input
        type="text"
        [(ngModel)]="terminoBusquedaLocal"
        (keydown.enter)="buscar()"
        placeholder="Buscar ..."
        class="search-input"
      />
      @if (terminoBusquedaLocal) {
        <button class="clear-search" (click)="limpiarBusqueda()">
          <i class="fas fa-times"></i>
        </button>
      }
    </div>
    <div class="filter-container" style="display: flex; align-items: center; gap: 1rem;">
      <ng-content></ng-content> <!-- Slot for external filters (e.g. State) to be placed to the left of columns -->
      <div class="custom-dropdown">
        <div class="dropdown-header"
             (click)="toggleColumnas()"
             (mouseenter)="onMouseEnter()"
             (mouseleave)="onMouseLeave()">
            <span class="current-value">
              <i class="fas fa-columns" style="margin-right: 8px;"></i>
              {{ columnaSeleccionada || 'Columnas' }}
            </span>
            <img
              [src]="isHovered || mostrarColumnas ? '/assets/down_solid.png' : '/assets/down_line.png'"
              alt="Desplegar"
              class="dropdown-arrow"
            >
        </div>
        @if (mostrarColumnas) {
            <ul class="dropdown-list">
                <li (click)="seleccionarColumna('')" [class.active]="columnaSeleccionada === ''">
                    <i class="fas fa-list"></i>
                    Todas las columnas
                </li>
                @for (columna of columnas; track columna) {
                <li (click)="seleccionarColumna(columna)" [class.active]="columnaSeleccionada === columna">
                    <i class="fas fa-table"></i>
                    {{ columna | titlecase }}
                </li>
                }
            </ul>
        }
      </div>
      <ng-content select=".boton-derecha"></ng-content>
    </div>
  </div>
