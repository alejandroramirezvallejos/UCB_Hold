<div class="form-container">
  <button class="btn-close" (click)="cerrar()">
    <img
      #closeIcon
      src="/assets/x.png"
      alt="Cerrar"
      style="width:100%; height:100%; object-fit: contain;"
      (mouseenter)="closeIcon.src = '/assets/x_color.png'"
      (mouseleave)="closeIcon.src = '/assets/x.png'"
    />
  </button>
  <div class="form-content">
    <h2>Registrar Categoría</h2>
    <form #form="ngForm" (ngSubmit)="validarregistro()">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="nombreCategoria"
          required
          maxlength="50"
          minlength="3"
          placeholder="Ingresa el nombre de la categoría"
          class="form-input"
        />
      </div>
      <div class="form-submit">
        <button type="submit" class="register-button" [disabled]="!form.valid">
          <span>Registrar Categoría</span>
        </button>
      </div>
    </form>
  </div>
</div>
@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}
@if(aviso()){
  <app-aviso
  [cerrar]="aviso"
  [mensaje]="mensajeaviso"
  (aceptar)="registrar()"
  ></app-aviso>
}
@if(exito()){
  <app-aviso-exito
  [exito]="exito"
  [mensaje]="mensajeexito"
  (accion)="cerrar()"
  ></app-aviso-exito>
}
