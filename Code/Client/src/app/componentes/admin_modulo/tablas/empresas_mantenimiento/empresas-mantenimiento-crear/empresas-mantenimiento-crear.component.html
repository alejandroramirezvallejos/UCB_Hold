<div class="form-container">
  <button class="btn-close" (click)="cerrar()">
    <img
      #closeIcon
      src="/assets/x.png"
      alt="Cerrar"
      style="width:100%; height:100%;"
      (mouseenter)="closeIcon.src = '/assets/x_color.png'"
      (mouseleave)="closeIcon.src = '/assets/x.png'"
    />
  </button>
  <div class="form-content">
    <h2>Registrar Empresa</h2>
    <form #form="ngForm" (ngSubmit)="validarregistro()">
      <div class="form-group">
        <label for="nombre">Nombre Empresa</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="empresaMantenimiento.NombreEmpresa"
          required
          maxlength="50"
          placeholder="Ingresa el nombre de la empresa"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="nombreResponsable">Nombre Responsable</label>
        <input
          type="text"
          id="nombreResponsable"
          name="nombreResponsable"
          [(ngModel)]="empresaMantenimiento.NombreResponsable"
          required
          maxlength="50"
          placeholder="Nombre del responsable"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="apellidoResponsable">Apellido Responsable</label>
        <input
          type="text"
          id="apellidoResponsable"
          name="apellidoResponsable"
          [(ngModel)]="empresaMantenimiento.ApellidoResponsable"
          required
          maxlength="50"
          placeholder="Apellido del responsable"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input
          type="tel"
          id="telefono"
          name="telefono"
          [(ngModel)]="empresaMantenimiento.Telefono"
          required
          maxlength="15"
          placeholder="Teléfono de contacto"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="direccion">Dirección</label>
        <input
          type="text"
          id="direccion"
          name="direccion"
          [(ngModel)]="empresaMantenimiento.Direccion"
          maxlength="100"
          placeholder="Dirección de la empresa"
          class="form-input"
        />
      </div>
      <div class="form-group">
        <label for="nit">NIT</label>
        <input
          type="text"
          id="nit"
          name="nit"
          [(ngModel)]="empresaMantenimiento.Nit"
          required
          maxlength="20"
          placeholder="NIT de la empresa"
          class="form-input"
        />
      </div>
      <div class="form-submit">
        <button type="submit" class="register-button" [disabled]="!form.valid">
          <span>Registrar Empresa</span>
        </button>
      </div>
    </form>
  </div>
</div>
@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}
@if(aviso()){
  <app-aviso
  [cerrar]="aviso"
  [mensaje]="mensajeaviso"
  (aceptar)="registrar()"
  ></app-aviso>
}
@if(exito()){
  <app-aviso-exito
  [exito]="exito"
  [mensaje]="mensajeexito"
  (accion)="cerrar()"
  ></app-aviso-exito>
}
