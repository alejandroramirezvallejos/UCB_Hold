<div class="form-container">
  <button class="btn-close" (click)="cerrar()">
    <img
      #closeIcon
      src="/assets/x.png"
      alt="Cerrar"
      style="width:100%; height:100%;"
      (mouseenter)="closeIcon.src = '/assets/x_color.png'"
      (mouseleave)="closeIcon.src = '/assets/x.png'"
    />
  </button>

  <div class="form-content">
    <h2>Registrar Equipo</h2>
    <form #form="ngForm" (ngSubmit)="validarcreacion()">
      <div class="form-group">
        <label for="nombreGrupoEquipo">Grupo Equipo</label>
        <select
          id="nombreGrupoEquipo"
          name="nombreGrupoEquipo"
          [(ngModel)]="grupoequipoSeleccionado"
          required
          class="form-input"
        >
          <option [ngValue]="null" disabled>Seleccione un grupo de equipo</option>
          @for (item of grupoequipo; track $index) {
            <option [ngValue]="item">{{ item.nombre }} {{ item.modelo }} {{ item.marca }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="ubicacion">Ubicación</label>
        <select
          id="ubicacion"
          name="ubicacion"
          [(ngModel)]="equipo.Ubicacion"
          required
          class="form-input"
        >
          <option value="" disabled selected>Seleccione un gavetero</option>
          @for (item of Gaveteros; track $index) {
            <option [value]="item">{{ item }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="codigoImt">Código IMT</label>
        <input
          type="text"
          id="codigoImt"
          name="codigoImt"
          [(ngModel)]="equipo.CodigoImt"
          required
          maxlength="50"
          placeholder="Código IMT del equipo"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="costoReferencia">Costo Referencia</label>
        <input
          type="number"
          id="costoReferencia"
          name="costoReferencia"
          [(ngModel)]="equipo.CostoReferencia"
          required
          min="0"
          step="0.01"
          placeholder="0.00"
          class="form-input"
        />
      </div>

      <div class="form-submit">
        <button type="submit" class="register-button" [disabled]="!form.valid">
          <span>Registrar Equipo</span>
        </button>
      </div>
    </form>
  </div>
</div>


@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}

@if(aviso()){
  <app-aviso
  [cerrar]="aviso"
  [mensaje]="mensajeaviso"
  (aceptar)="registrar()"
  ></app-aviso>
}

@if(exito()){
  <app-aviso-exito
  [exito]="exito"
  [mensaje]="mensajeexito"
  (accion)="cerrar()"
  ></app-aviso-exito>
}
