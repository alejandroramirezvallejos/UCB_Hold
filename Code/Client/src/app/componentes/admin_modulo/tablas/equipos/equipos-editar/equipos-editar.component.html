<div class="form-container">
  <button class="btn-close" (click)="cerrar()">
    <img
      #closeIcon
      src="/assets/x.png"
      alt="Cerrar"
      style="width:100%; height:100%; object-fit: contain;"
      (mouseenter)="closeIcon.src = '/assets/x_color.png'"
      (mouseleave)="closeIcon.src = '/assets/x.png'"
    />
  </button>
  <div class="form-content">
    <h2>Editar Equipo</h2>
    <form #form="ngForm" (ngSubmit)="validaredicion()">
     <div class="form-group">
      <label for="grupo_equipo">Grupo Equipo</label>
      <app-custom-select
        name="grupo_equipo"
        [(ngModel)]="grupoequipoSeleccionado"
        [opciones]="gruposOpciones"
      ></app-custom-select>
    </div>
    <div class="form-group">
      <label for="codigo_ucb">Código UCB</label>
      <input
        type="text"
        id="codigo_ucb"
        name="codigo_ucb"
        [(ngModel)]="equipo.CodigoUcb"
        required
        maxlength="20"
        placeholder="Código UCB del equipo"
        class="form-input"
      />
    </div>
    <div class="form-group">
      <label for="numero_serial">Número Serial</label>
      <input
        type="text"
        id="numero_serial"
        name="numero_serial"
        [(ngModel)]="equipo.NumeroSerial"
        required
        maxlength="50"
        placeholder="Número serial del equipo"
        class="form-input"
      />
    </div>
    <div class="form-group">
      <label for="estado_equipo">Estado Equipo</label>
      <app-custom-select
        name="estado_equipo"
        [(ngModel)]="equipo.EstadoEquipo"
        required
        [opciones]="estadoOpciones"
        placeholder="Estado del equipo"
      ></app-custom-select>
    </div>
    <div class="form-group">
      <label for="ubicacion">Ubicación</label>
      <input
        type="text"
        id="ubicacion"
        name="ubicacion"
        [(ngModel)]="equipo.Ubicacion"
        required
        maxlength="200"
        placeholder="Ubicación del equipo"
        class="form-input"
      />
    </div>
     <div class="form-group">
      <label for="nombre_gavetero">Gavetero</label>
      <app-custom-select
        name="nombre_gavetero"
        [(ngModel)]="gaveteraSeleccionada"
        [opciones]="gaveterosOpciones"
        placeholder="Sin gavetero"
      ></app-custom-select>
    </div>
    <div class="form-group">
      <label for="costo_referencia">Costo Referencia</label>
      <input
        type="number"
        id="costo_referencia"
        name="costo_referencia"
        [(ngModel)]="equipo.CostoReferencia"
        required
        max="999999999"
        step="0.01"
        placeholder="0.00"
        class="form-input"
      />
    </div>
    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <textarea
        id="descripcion"
        name="descripcion"
        [(ngModel)]="equipo.Descripcion"
        rows="3"
        maxlength="200"
        placeholder="Describe las características del equipo"
        class="form-input"
      ></textarea>
    </div>
    <div class="form-group">
      <label for="tiempo_max_prestamo">Tiempo Máximo Préstamo</label>
      <input
        type="number"
        id="tiempo_max_prestamo"
        name="tiempo_max_prestamo"
        [(ngModel)]="equipo.TiempoMaximoPrestamo"
        max="365"
        placeholder="Tiempo en días"
        class="form-input"
      />
    </div>
    <div class="form-group">
      <label for="procedencia">Procedencia</label>
      <input
        type="text"
        id="procedencia"
        name="procedencia"
        [(ngModel)]="equipo.Procedencia"
        required
        maxlength="200"
        placeholder="Procedencia del equipo"
        class="form-input"
      />
    </div>
    <div class="form-submit">
      <button type="submit" class="register-button" [disabled]="!form.valid">
        <span>Confirmar Cambios</span>
      </button>
    </div>
  </form>
  </div>
</div>
@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}
@if(aviso()){
  <app-aviso
  [cerrar]="aviso"
  [mensaje]="mensajeaviso"
  (aceptar)="confirmar()"
  ></app-aviso>
}
@if(exito()){
  <app-aviso-exito
  [exito]="exito"
  [mensaje]="mensajeexito"
  (accion)="cerrar()"
  ></app-aviso-exito>
}
