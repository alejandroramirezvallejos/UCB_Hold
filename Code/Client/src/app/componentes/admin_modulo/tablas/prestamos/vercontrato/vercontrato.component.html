<div class="modal-overlay">
  <div class="modal-container">
    <button class="btn-close" (click)="cerrar()" type="button">
      <img
        #closeIcon
        src="/assets/x.png"
        alt="Cerrar"
        style="width:100%; height:100%; object-fit: contain;"
        (mouseenter)="closeIcon.src = '/assets/x_color.png'"
        (mouseleave)="closeIcon.src = '/assets/x.png'"
      />
    </button>
    <div class="modal-header">
      <h2 class="modal-title">Contrato</h2>
    </div>
    <div class="modal-content">
      <div class="contract-viewer">
        <div class="contract-content" *ngIf="contratoContent; else loading"
           [innerHTML]="contratoContent">
        </div>
        <ng-template #loading>
          <div class="loading">
            <div class="spinner"></div>
            <p>Cargando contrato...</p>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}
