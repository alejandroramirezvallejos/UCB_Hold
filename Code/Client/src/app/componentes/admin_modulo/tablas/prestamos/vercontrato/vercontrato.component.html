<div class="modal-overlay">
  <div class="modal-container">
    <!-- Header with close button -->
    <div class="modal-header">
      <h2 class="modal-title">Ver Contrato</h2>
      <button class="btn-close" (click)="cerrar()" type="button">
        <img
          #closeIcon
          src="/assets/x.png"
          alt="Cerrar"
          style="width:100%; height:100%; object-fit: contain; filter: brightness(0) invert(1);"
          (mouseenter)="closeIcon.style.filter = 'brightness(0) invert(1) drop-shadow(0 0 2px rgba(255,255,255,0.5))'"
          (mouseleave)="closeIcon.style.filter = 'brightness(0) invert(1)'"
        />
      </button>
    </div>

    <!-- Modal content -->
    <div class="modal-content">
      <div class="contract-viewer">
        <div class="contract-content" *ngIf="contratoContent; else loading"
           [innerHTML]="contratoContent">
        </div>

        <ng-template #loading>
          <div class="loading">
            <div class="spinner"></div>
            <p>Cargando contrato...</p>
          </div>
        </ng-template>
      </div>
    </div>

    <!-- Footer with close button -->
    <div class="modal-footer">
      <button class="btn-secondary" (click)="cerrar()" type="button">
        Cerrar
      </button>
    </div>
  </div>
</div>




@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}
