<div class="form-container">
  <button class="btn-close" (click)="cerrar()">
    <img
      #closeIcon
      src="/assets/x.png"
      alt="Cerrar"
      style="width:100%; height:100%;"
      (mouseenter)="closeIcon.src = '/assets/x_color.png'"
      (mouseleave)="closeIcon.src = '/assets/x.png'"
    />
  </button>

  <div class="form-content">
    <h2>Registrar Accesorio</h2>
    <form #form="ngForm" (ngSubmit)="confirmarcreacion()">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="accesorio.nombre"
          required
          maxlength="25"
          placeholder="Ingresa el nombre del accesorio"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="modelo">Modelo</label>
        <input
          type="text"
          id="modelo"
          name="modelo"
          [(ngModel)]="accesorio.modelo"
          required
          maxlength="25"
          placeholder="Modelo del accesorio"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <input
          type="text"
          id="tipo"
          name="tipo"
          [(ngModel)]="accesorio.tipo"
          required
          maxlength="25"
          placeholder="Tipo de accesorio"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea
          id="descripcion"
          name="descripcion"
          [(ngModel)]="accesorio.descripcion"
          required
          maxlength="100"
          placeholder="Descripción del accesorio"
          class="form-input"
        ></textarea>
      </div>

      <div class="form-submit">
        <button type="submit" class="register-button" [disabled]="!form.valid">
          <span>Crear Accesorio</span>
        </button>
      </div>
    </form>
  </div>
</div>


@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}

@if(aviso()){
  <app-aviso
  [cerrar]="aviso"
  [mensaje]="mensajeaviso"
  (aceptar)="registrar()"
  ></app-aviso>
}

@if(exito()){
  <app-aviso-exito
  [exito]="exito"
  [mensaje]="mensajeexito"
  (accion)="cerrar()"
  ></app-aviso-exito>
}
