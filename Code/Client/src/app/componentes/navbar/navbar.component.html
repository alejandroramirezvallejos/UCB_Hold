<nav
  class="navbar-container"
  role="navigation"
  aria-label="Main navigation"
>
  <div class="left-section">
    @if(showAdminSidebarToggle()) {
    <button
      type="button"
      class="icon-button menu-button"
      aria-label="Menú Admin"
      (click)="toggleSidebar()"
    >
      <img
        #menuIcon
        src="/assets/menu_line.png"
        alt="Menú Admin"
        class="icon-image"
        (mouseenter)="menuIcon.src = '/assets/menu_solid.png'"
        (mouseleave)="menuIcon.src = '/assets/menu_line.png'"
      />
    </button>
    }
    @if(showBack()) {
    <button
      type="button"
      class="icon-button back-button"
      aria-label="Volver atrás"
      (click)="goBack()"
    >
      <img
        #backIcon
        src="/assets/back_line.png"
        alt="Icono de volver"
        class="icon-image"
        (mouseenter)="backIcon.src = '/assets/back_solid.png'"
        (mouseleave)="backIcon.src = '/assets/back_line.png'"
      />
    </button>
    }
    @if(showHome()) {
    <button
      type="button"
      class="icon-button home-button"
      aria-label="Ir a inicio"
      (click)="botonhome()"
    >
      <img
        #homeIcon
        src="/assets/home_line.png"
        alt="Icono de inicio"
        class="icon-image"
        (mouseenter)="homeIcon.src = '/assets/home_solid.png'"
        (mouseleave)="homeIcon.src = '/assets/home_line.png'"
      />
    </button>
    }
  </div>
  <div class="logo-container">
    <img   #logoIcon (click)="botonhome()" src="/assets/logo_universidad.png" alt="Logo UCB"   class="logo-image" 
    (mouseenter)="logoIcon.style.cursor = 'pointer'"
    (mouseleave)="logoIcon.style.cursor = 'default'"
    />
  </div>
  <div class="right-section">
   @if(showCart()) {
    <button
      type="button"
      class="icon-button cart-button"
      aria-label="Mostrar carrito"
      (click)="mostrarcarrito()"
    >
      <img
        #cartIcon
        src="/assets/shopping_card_line.png"
        alt="Icono de carrito"
        class="icon-image"
        (mouseenter)="cartIcon.src = '/assets/shopping_card_solid.png'"
        (mouseleave)="cartIcon.src = '/assets/shopping_card_line.png'"
      />
      <span class="cart-count">{{ totalproductos() }}</span>
    </button>
    }
    @if(showProfile()) {
    <div class="user-menu">
       <button
        type="button"
        class="icon-button user-button"
        aria-haspopup="true"
        (click)="toggleUserMenu()"
      >
        <img
          #userIcon
          src="/assets/profile_line.png"
          alt="Icono de usuario"
          class="icon-image"
          (mouseenter)="userIcon.src = '/assets/profile_solid.png'"
          (mouseleave)="userIcon.src = '/assets/profile_line.png'"
        />
      </button>
    </div>
    }
  </div>
</nav>
<div class="navbar-spacer"></div>
@if(showUserMenu()) {
  <app-usuario-previo
    [showUserMenu]="showUserMenu"
  ></app-usuario-previo>
}
