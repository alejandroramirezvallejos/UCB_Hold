@if (sidebarService.isOpen()){
  <div class="sidebar-menu">
    <div class="contenido">
      @for (nav of contenido; track $index) {
        <div class="item" [class.active]="nav === activeItem" (click)="clickitem(nav)">
          <i [class]="getIcon(nav)"></i>
          <span class="item-text">{{ nav }}</span>
        </div>
      }
    </div>
  </div>
}
