<div class="container-search">
  <div
    class="search-input"
    [class.open]="showCategories"
  >
    <img
      class="icon"
      src="assets/search_line.png"
      alt="Buscar"
      (mouseenter)="hover.search = true"
      (mouseleave)="hover.search = false"
      [src]="
        hover.search ? '/assets/search_solid.png' : '/assets/search_line.png'
      " />
    <textarea
      [(ngModel)]="solicitud"
      placeholder="Buscar..."
      rows="1"
      (keydown.enter)="$event.preventDefault()"
      (focus)="showCategories = false"
    ></textarea>
    
    @if (solicitud) {
      <button class="clear-search" (click)="limpiarBusqueda()" title="Limpiar búsqueda" type="button">
        <i class="fas fa-times"></i>
      </button>
    }
    <img
      class="icon category-icon"
      src="assets/categories_line.png"
      alt="Categorías"
      (click)="mostrarcategorias()"
      (mouseenter)="hover.categories = true"
      (mouseleave)="hover.categories = false"
      [src]="
        hover.categories
          ? '/assets/categories_solid.png'
          : '/assets/categories_line.png'
      "
    />
  </div>
  @if (showCategories) {
    <div class="categories-panel">
      <div class="categories-list">
        <div
          class="category-item"
          [class.selected]="estaCategoriaSeleccionada('sinCategoria')"
          (click)="seleccionarcategoria('sinCategoria')">
          Sin categoría
        </div>
        @for (item of items; track item.Nombre) {
          <div
            class="category-item"
            [class.selected]="estaCategoriaSeleccionada(item.Nombre!)"
            (click)="seleccionarcategoria(item.Nombre!)">
            {{ item.Nombre }}
          </div>
        }
      </div>
    </div>
  }
</div>
<app-lista-objetos
  [categorias]="categoriasArray"
  [producto]="solicitud"
></app-lista-objetos>
@if(error()){
  <app-mostrarerror
  [error]="error"
  [mensaje]="mensajeerror"
  ></app-mostrarerror>
}
