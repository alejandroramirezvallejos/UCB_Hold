<div class="signature-overlay" *ngIf="clickfirma()">

  <div class="signature-container">
    <button class="close-button" (click)="close()">
      <img
        #closeIcon
        src="/assets/x.png"
        alt="Cerrar"
        (mouseenter)="closeIcon.src = '/assets/x_color.png'"
        (mouseleave)="closeIcon.src = '/assets/x.png'"
        style="width: 24px; height: 24px;"
      />
    </button>


    <div class="signature-instructions">
     Firme en el espacio en blanco

    </div>

    <canvas #signatureCanvas class="signature-pad"></canvas>
    <div class="buttons">
      <button (click)="clearSignature()">Limpiar</button>
      <button (click)="saveSignature()">Guardar Firma</button>
    </div>
  </div>
</div>
