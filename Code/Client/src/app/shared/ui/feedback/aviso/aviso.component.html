<div class="container">
  <button class="cerrar" (click)="click()" aria-label="Cerrar">
    <img src="assets/x.png" alt="Cerrar" />
  </button>
  <h1>Aviso</h1>
  <div class="mensaje-container">
    <p>{{ mensaje }}</p>

  <div class="botones-container">

    <div class="aceptar" (click)="onAceptar()">Aceptar</div>
  </div>
</div>
