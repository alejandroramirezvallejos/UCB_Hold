services:
  ucb_db:
    container_name: ucb_db
    image: postgres:14
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=IMT_Reservas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ucb_db_data:/var/lib/postgresql/data
      - ./DataBase/server.sql:/docker-entrypoint-initdb.d/01-init.sql

  ucb_redis:
    container_name: ucb_redis
    image: redis:7-alpine
    restart: on-failure
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ucb_server:
    container_name: ucb_server
    build: ./Server
    restart: on-failure
    ports:
      - "5000:80"
    env_file:
      - server.env
    depends_on:
      ucb_db:
        condition: service_healthy
      ucb_redis:
        condition: service_healthy

  ucb_client:
    container_name: ucb_client
    build: ./Client
    restart: on-failure
    ports:
      - "4200:80"
    depends_on:
      - ucb_server

volumes:
  ucb_db_data:
