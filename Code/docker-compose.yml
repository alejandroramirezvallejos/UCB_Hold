services:
  ucb_db:
    container_name: ucb_db
    image: postgres:16-alpine
    restart: on-failure
    env_file:
      - server.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ucb_db_data:/var/lib/postgresql/data
      - ./DataBase/server.sql:/docker-entrypoint-initdb.d/01-init.sql

  ucb_redis:
    container_name: ucb_redis
    image: redis:7-alpine
    restart: on-failure
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ucb_redis_data:/data

  ucb_elastic:
    container_name: ucb_elastic
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: on-failure
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ucb_elastic_data:/usr/share/elasticsearch/data

  ucb_server:
    container_name: ucb_server
    build: ./Server
    restart: on-failure
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5000:8080"
    env_file:
      - server.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      HttpsRedirection__Enabled: "false"
      Elasticsearch__Uri: http://ucb_elastic:9200
      Redis__ConnectionString: ucb_redis:6379
    depends_on:
      ucb_db:
        condition: service_healthy
      ucb_redis:
        condition: service_healthy
      ucb_elastic:
        condition: service_healthy

  ucb_client:
    container_name: ucb_client
    build: ./Client
    restart: on-failure
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:4200:8080"
    depends_on:
      ucb_server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ucb_db_data:
  ucb_redis_data:
  ucb_elastic_data:
