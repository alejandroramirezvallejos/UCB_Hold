services:
  ucb_db:
    container_name: ucb_db
    image: postgres:14
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=IMT_Reservas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ucb_db_data:/var/lib/postgresql/data         
      - ./Database/server.sql:/docker-entrypoint-initdb.d/init.sql  

  ucb_server:
    container_name: ucb_server
    build: ./Server
    restart: on-failure
    ports:
      - "5000:80"
    env_file:
      - server.env  
    depends_on:
      ucb_db:
        condition: service_healthy   

  ucb_client:
    container_name: ucb_client
    build: ./Client
    restart: on-failure
    ports:
      - "4200:80"
    depends_on:
      - ucb_server

volumes:
  ucb_db_data:
