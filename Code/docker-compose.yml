services:
  ucb_db:
    container_name: ucb_db
    image: postgres:14
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=IMT_Reservas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ucb_db_data:/var/lib/postgresql/data
      - ./DataBase/server.sql:/docker-entrypoint-initdb.d/01-init.sql

  ucb_redis:
    container_name: ucb_redis
    image: redis:7-alpine
    restart: on-failure
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ucb_elastic:
    container_name: ucb_elastic
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: on-failure
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ucb_elastic_data:/usr/share/elasticsearch/data

  ucb_server:
    container_name: ucb_server
    build: ./Server
    restart: on-failure
    ports:
      - "5000:80"
    env_file:
      - server.env
    environment:
      - Elasticsearch__Uri=http://ucb_elastic:9200
    depends_on:
      ucb_db:
        condition: service_healthy
      ucb_redis:
        condition: service_healthy
      ucb_elastic:
        condition: service_healthy

  ucb_client:
    container_name: ucb_client
    build: ./Client
    restart: on-failure
    ports:
      - "4200:80"
    depends_on:
      - ucb_server

volumes:
  ucb_db_data:
  ucb_elastic_data:
